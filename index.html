<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hoje eu tô...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #6a1b9a, #9c27b0);
      min-height: 100vh;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 50px;
    }

    .container { width: 100%; max-width: 500px; padding: 20px; }

    header { text-align: center; padding: 30px 0 10px; }
    h1 { font-size: 2.5rem; font-weight: 700; }
    .subtitle { opacity: 0.9; margin-bottom: 20px; }

    .main {
      background: white;
      color: #333;
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: #f8f9fa;
      border: 2px solid #e0e0e0;
      border-radius: 15px;
      padding: 15px 10px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .card:active { transform: scale(0.95); }
    .card.selecionado { border-color: #9c27b0; background: #f3e5f5; }

    .emoji { font-size: 2.5rem; display: block; }
    .texto { font-size: 0.9rem; font-weight: 600; }

    #campoNota {
      display: none;
      margin-top: 20px;
      border-top: 1px solid #eee;
      padding-top: 15px;
    }

    textarea {
      width: 100%;
      height: 80px;
      border: 2px solid #eee;
      border-radius: 12px;
      padding: 12px;
      font-family: inherit;
      resize: none;
      margin: 10px 0;
    }

    .btn-salvar {
      width: 100%;
      background: #4caf50;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .frase-impacto {
      margin: 15px 0;
      padding: 15px;
      border-radius: 12px;
      background: #f3e5f5;
      color: #6a1b9a;
      font-style: italic;
      font-size: 0.95rem;
      text-align: center;
      display: none;
      border-left: 5px solid #9c27b0;
    }

    .history-section {
      margin-top: 25px;
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 20px;
      width: 100%;
    }

    .history-grid {
      display: flex;
      justify-content: flex-start;
      margin-top: 15px;
      overflow-x: auto;
      gap: 10px;
      padding-bottom: 10px;
    }

    .history-item {
      text-align: center;
      background: rgba(255, 255, 255, 0.2);
      padding: 10px;
      border-radius: 12px;
      min-width: 75px;
      cursor: pointer;
    }

    .history-date { font-size: 0.65rem; display: block; margin-top: 5px; color: #eee; }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      justify-content: center; align-items: center;
      z-index: 100; padding: 20px;
    }

    .modal-content {
      background: white; color: #333; padding: 30px;
      border-radius: 24px; max-width: 400px; width: 100%;
      text-align: center; position: relative;
    }

    .modal-close { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; }

    .reset-btn { background: none; border: none; color: #ffab91; cursor: pointer; text-decoration: underline; font-size: 0.8rem; margin-top: 20px; width: 100%; }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>Hoje eu tô...</h1>
    <p class="subtitle">Registre seu momento, a qualquer hora.</p>
  </header>

  <div class="main">
    <div class="grid" id="gridHumores"></div>
    
    <div id="fraseEmocional" class="frase-impacto"></div>

    <div id="campoNota">
      <p style="font-size: 0.9rem; font-weight: 600;">O que está acontecendo agora?</p>
      <textarea id="textoMotivo" placeholder="Desabafe aqui..."></textarea>
      <button class="btn-salvar" onclick="finalizarRegistro()">Salvar Momento</button>
    </div>
  </div>

  <div class="history-section">
    <h3 style="font-size: 1rem; text-align: center;">Linha do tempo</h3>
    <div class="history-grid" id="historico"></div>
  </div>

  <button class="reset-btn" onclick="resetarTudo()">Apagar todo o histórico</button>
</div>

<div id="modalDiario" class="modal" onclick="fecharModal()">
  <div class="modal-content" onclick="event.stopPropagation()">
    <span class="modal-close" onclick="fecharModal()">&times;</span>
    <div id="modalEmoji" style="font-size: 4rem;"></div>
    <h2 id="modalData" style="margin: 10px 0; color: #6a1b9a; font-size: 1.2rem;"></h2>
    <p id="modalTexto" style="line-height: 1.6; color: #555; background: #f9f9f9; padding: 15px; border-radius: 12px; text-align: left;"></p>
  </div>
</div>

<script>
  const humores = [
    { emoji: "😊", texto: "Tô de boa", frase: "Que bom que as coisas estão leves agora." },
    { emoji: "🔥", texto: "Tô motivado", frase: "Use essa energia para realizar algo incrível!" },
    { emoji: "😌", texto: "Tô tranquilo", frase: "Aproveite esse momento de paz interior." },
    { emoji: "😩", texto: "Tô cansado", frase: "Não tem problema parar um pouco. Recarregue." },
    { emoji: "😤", texto: "Tô estressado", frase: "Respire fundo. Esse sentimento é passageiro." },
    { emoji: "🥲", texto: "Tô na luta", frase: "Você é mais forte do que imagina. Continue!" },
    { emoji: "💸", texto: "Tô quebrado", frase: "Fases difíceis vêm, mas também vão. Persista." },
    { emoji: "😴", texto: "Tô com sono", frase: "Dê ao seu corpo o descanso que ele merece." }
  ];

  let humorSelecionado = null;

  function init() {
    renderizarCards();
    atualizarHistorico();
  }

  function renderizarCards() {
    const grid = document.getElementById('gridHumores');
    grid.innerHTML = humores.map(h => `
      <div class="card" id="card-${h.emoji}" onclick="selecionarHumor('${h.emoji}')">
        <span class="emoji">${h.emoji}</span>
        <span class="texto">${h.texto}</span>
      </div>
    `).join('');
  }

  function selecionarHumor(emoji) {
    humorSelecionado = emoji;
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selecionado'));
    document.getElementById(`card-${emoji}`).classList.add('selecionado');
    
    // Mostra a frase emocional na hora
    const fraseDiv = document.getElementById('fraseEmocional');
    fraseDiv.innerText = humores.find(h => h.emoji === emoji).frase;
    fraseDiv.style.display = 'block';
    
    document.getElementById('campoNota').style.display = 'block';
    document.getElementById('textoMotivo').focus();
  }

  function finalizarRegistro() {
    const motivo = document.getElementById('textoMotivo').value;
    const agora = new Date();
    const dataFormatada = agora.toLocaleDateString('pt-BR');
    const horaFormatada = agora.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    
    const novoRegistro = {
      id: Date.now(),
      data: dataFormatada,
      hora: horaFormatada,
      emoji: humorSelecionado,
      motivo: motivo || "Apenas registrei o humor.",
    };

    let historico = JSON.parse(localStorage.getItem('meuHistorico') || "[]");
    historico.push(novoRegistro);
    localStorage.setItem('meuHistorico', JSON.stringify(historico));

    // Reset interface
    document.getElementById('textoMotivo').value = '';
    document.getElementById('campoNota').style.display = 'none';
    document.getElementById('fraseEmocional').style.display = 'none';
    document.querySelectorAll('.card').forEach(c => c.classList.remove('selecionado'));
    
    atualizarHistorico();
  }

  function atualizarHistorico() {
    const lista = JSON.parse(localStorage.getItem('meuHistorico') || "[]");
    const container = document.getElementById('historico');
    
    if (lista.length === 0) {
      container.innerHTML = "<p style='font-size: 0.8rem; opacity: 0.6;'>Seu histórico aparecerá aqui.</p>";
      return;
    }

    container.innerHTML = lista.slice().reverse().map(item => `
      <div class="history-item" onclick="abrirDia(${item.id})">
        <span style="font-size: 1.5rem;">${item.emoji}</span>
        <span class="history-date">${item.data.split('/')[0]}/${item.data.split('/')[1]} às ${item.hora}</span>
      </div>
    `).join('');
  }

  function abrirDia(id) {
    const historico = JSON.parse(localStorage.getItem('meuHistorico'));
    const registro = historico.find(h => h.id === id);
    
    if (registro) {
      document.getElementById('modalEmoji').innerText = registro.emoji;
      document.getElementById('modalData').innerText = `${registro.data} às ${registro.hora}`;
      document.getElementById('modalTexto').innerText = registro.motivo;
      document.getElementById('modalDiario').style.display = 'flex';
    }
  }

  function fecharModal() {
    document.getElementById('modalDiario').style.display = 'none';
  }

  function resetarTudo() {
    if (confirm("Deseja apagar todos os registros permanentemente?")) {
      localStorage.removeItem('meuHistorico');
      location.reload();
    }
  }

  window.onload = init;
</script>
</body>
</html>
